name: Build and Push Docker Image

# 触发条件：推送到 main 分支 或 创建 tag 时自动构建
on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Docker Buildx（官方推荐构建工具）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 Docker Hub（需要提前在仓库设置密钥）
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 构建并推送镜像
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }} # PR 不推送，只构建测试
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dockermy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dockermy:${{ github.sha }}
